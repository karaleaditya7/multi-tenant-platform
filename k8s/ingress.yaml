apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user1-ingress
  namespace: user1
spec:
  rules:
  - host: user1.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: webapp
            port:
              number: 80

